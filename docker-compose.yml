services:
  memgraph-db:
    image: memgraph/memgraph-mage:latest
    container_name: memgraph-server
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "7687:7687"
    environment:
      # Aktiviert die Authentifizierung und zeigt auf den internen Pfad der Passwortdatei:
      - MEMGRAPH=--auth-basic-init=true --password-file=/etc/memgraph/users.txt --bolt-address=0.0.0.0
    volumes:
      - ./data:/var/lib/memgraph
      - ./log:/var/log/memgraph
      # HIER: Deine lokale users.txt wird sicher als schreibgeschützt in den Container gereicht
      - ./users.txt:/etc/memgraph/users.txt:ro

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: memgraph-lab
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - memgraph-db

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: graphstation-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - MEMGRAPH_HOST=memgraph-db
    depends_on:
      - memgraph-db
    volumes:
      - ./backend/session_cache.json:/app/session_cache.json

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        - VITE_SYNOLOGY_URL=${SYNOLOGY_URL:-}
    container_name: graphstation-frontend
    restart: unless-stopped
    ports:
      - "443:443"
    depends_on:
      - api
    volumes:
      - ./frontend/certs:/etc/nginx/certs:ro
